[package]
name = "ogos_lib"
edition = { workspace = true }
license = { workspace = true }
publish = { workspace = true }
version = { workspace = true }

[lib]
crate-type = ["lib"]

[dependencies]
anyhow = { version = "1.0.92", default-features = false }
argfile = "0.2.1"
bincode = "1.3.3"
bitflags = "2.9.1"
blake3 = { version = "1.8.2", default-features = false }
cfg-if = "1.0.3"
clap = { version = "4.3.0", default-features = false, features = ["derive", "help", "std"] }
com-policy-config = "0.6.0"
concat-string = "1.0.1"
const_format = { version = "0.2.34", default-features = false }
ddc = "0.2.2"
ddc-winapi = "0.2.2"
discord-rich-presence = "1.0.0"
eframe = { version = "0.33.0", default-features = false, features = ["default_fonts", "wgpu"] }
egui_extras = { version = "0.33.0", default-features = false }
hidapi = { version = "*", default-features = false, features = ["windows-native"] }
image = { version = "0.25", default-features = false, features = ["jpeg", "png", "webp"] }
indexmap = { version = "2.12.1", features = ["serde"] }
log = { workspace = true }
log-panics = { workspace = true }
mki = { path = "../../mki-rust" }
netcorehost = "0.19.0"
nvapi-sys = "0.1.3"
nvapi_sys_new = "=0.1.5"
ogos_proc_macros = { path = "../ogos_proc_macros" }
once_cell = "1.19.0"
opener = "0.8.3"
qmk-via-api = { version = "0.5", default-features = false }
rand = { version = "0.9.2", default-features = false, features = ["thread_rng"] }
rayon = "1.11.0"
resize = { version = "0.8.8", default-features = false, features = ["std"] }
rgb = "0.8.52"
rust-ini = "0.21.1"
serde = { version = "1.0.204", default-features = false, features = ["rc"] }
serde_json = "1.0.121"
serde_json5 = "0.2.1"
simplelog = { workspace = true }
strum = { version = "0.27.1", features = ["derive"] }
subenum = { version = "1.1.2", default-features = false }
sysinfo = { version = "0.37.2", default-features = false, features = ["multithread", "system"] }
thiserror = "2.0.17"
tokio = { version = "1.46.1", features = ["sync"] }
wgpu = { version = "*", features = ["dx12"] }
which = "8.0.0"
widestring = { version = "1.2.0", default-features = false, features = ["std"] }
windows = { workspace = true }
windows_061 = { version = "0.61", package = "windows", features = [
    "Win32_Devices_FunctionDiscovery"
] }

[features]
dbg_console = []
dbg_cpu_sets = []
dbg_cursor_watch = []
dbg_window_info = []
dbg_window_shift_delta = []
dbg_window_shift_destroy = []
dbg_window_watch_win_events = []
