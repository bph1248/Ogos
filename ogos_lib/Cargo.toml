[package]
name = "ogos_lib"
edition = { workspace = true }
license = { workspace = true }
publish = { workspace = true }
version = { workspace = true }

[lib]
crate-type = ["lib"]

[dependencies]
anyhow = "1.0.92"
argfile = "0.2.1"
bincode = "1.3.3"
bitflags = "2.9.1"
blake3 = { version = "1.8.2", features = ["rayon"] }
cfg-if = "1.0.3"
clap = { version = "4.3.0", features = ["derive"] }
com-policy-config = "0.6.0"
concat-string = "1.0.1"
const_format = "0.2.34"
ddc-hi = "0.4.1"
discord-rich-presence = "1.0.0"
eframe = { version = "0.33.0", features = [
    "default_fonts",
    "wgpu"
] }
egui_extras = "0.33.0"
image = { version = "0.25", features = ["jpeg", "png", "webp"] }
indexmap = { version = "2.12.1", features = ["serde"] }
log = { workspace = true }
log-panics = { workspace = true }
mki = { path = "../../mki-rust" }
netcorehost = "0.19.0"
nvapi-sys = "0.1.3"
nvapi_sys_new = "=0.1.5"
ogos_proc_macros = { path = "../ogos_proc_macros" }
once_cell = "1.19.0"
opener = "0.8.3"
qmk-via-api = { path = "../../qmk-via-api" }
rand = "0.9.2"
rayon = "1.11.0"
raw-window-handle = "0.6.2"
resize = "0.8.8"
rgb = "0.8.52"
rust-ini = "0.21.1"
serde = { version = "1.0.204", features = ["rc"] }
serde_json = "1.0.121"
serde_json5 = "0.2.1"
simplelog = { workspace = true }
strum = { version = "0.27.1", features = ["derive"] }
subenum = "1.1.2"
sysinfo = "0.29.0"
thiserror = "1.0.60"
tokio = { version = "1.46.1", features = ["full"] }
which = "6.0.1"
widestring = "1.2.0"
windows = { workspace = true }
windows_061 = { version = "0.61", package = "windows", features = [
    "Win32_Devices_FunctionDiscovery"
] }

[features]
bug_hunting_cpu_sets = []
bug_hunting_screen_extent = []
bug_hunting_taskbar_window_pos_changing = []
bug_hunting_taskbar_win_events = []
bug_hunting_taskbar_win_events_all_foreground = []
bug_hunting_taskbar_win_messages = []
bug_hunting_window_shift_destroy = []
bug_hunting_window_watch_win_events = []
dbg_console = []
dbg_cursor_watch = []
dbg_window_info = []
dbg_window_shift_delta = []
